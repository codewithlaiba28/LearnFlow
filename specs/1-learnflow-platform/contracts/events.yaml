## Topic Configuration

### Partition Strategy
```yaml
topics:
  learning.events:
    partitions: 3
    replicationFactor: 1
    retentionMs: 604800000  # 7 days
    
  code.submissions:
    partitions: 3
    replicationFactor: 1
    retentionMs: 2592000000  # 30 days
    
  exercise.completions:
    partitions: 3
    replicationFactor: 1
    retentionMs: 31536000000  # 1 year
    
  student.struggles:
    partitions: 1
    replicationFactor: 1
    retentionMs: 259200000  # 3 days (alerts are ephemeral)
    
  progress.updates:
    partitions: 3
    replicationFactor: 1
    retentionMs: 604800000  # 7 days (for real-time dashboards)
```

### Consumer Groups
```yaml
consumerGroups:
  - groupId: progress-tracker
    topics: [exercise.completions, code.submissions]
    purpose: Update student mastery scores
    
  - groupId: struggle-detector
    topics: [code.submissions, learning.events]
    purpose: Detect when students need help
    
  - groupId: analytics-pipeline
    topics: [learning.events, exercise.completions, progress.updates]
    purpose: Feed data warehouse for reporting
    
  - groupId: notification-service
    topics: [student.struggles]
    purpose: Send alerts to teachers
```

