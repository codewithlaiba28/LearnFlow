## Topic: student.struggles

**Purpose**: Alert teachers when students need intervention.

### Schema
```json
{
  "$schema": "http://json-schema.org/draft-07/schema#",
  "title": "StruggleEvent",
  "type": "object",
  "properties": {
    "eventId": {
      "type": "string",
      "format": "uuid"
    },
    "userId": {
      "type": "integer"
    },
    "studentName": {
      "type": "string",
      "description": "Student name for quick identification"
    },
    "eventType": {
      "type": "string",
      "enum": [
        "same_error_repeated",
        "stuck_timeout",
        "low_quiz_score",
        "verbal_struggle",
        "failed_executions"
      ]
    },
    "severity": {
      "type": "string",
      "enum": ["low", "medium", "high"],
      "description": "Alert priority"
    },
    "context": {
      "type": "object",
      "properties": {
        "moduleId": {
          "type": "string"
        },
        "topic": {
          "type": "string"
        },
        "errorMessages": {
          "type": "array",
          "items": {
            "type": "string"
          }
        },
        "codeAttempts": {
          "type": "array",
          "items": {
            "type": "string"
          }
        },
        "timeStuck": {
          "type": "integer",
          "description": "Seconds spent on current problem"
        }
      }
    },
    "triggeredAt": {
      "type": "string",
      "format": "date-time"
    },
    "autoResolved": {
      "type": "boolean",
      "description": "Whether student solved it before teacher intervention"
    }
  },
  "required": ["eventId", "userId", "studentName", "eventType", "severity", "triggeredAt"]
}
```

### Example Event
```json
{
  "eventId": "880e8400-e29b-41d4-a716-446655440003",
  "userId": 67890,
  "studentName": "James",
  "eventType": "same_error_repeated",
  "severity": "high",
  "context": {
    "moduleId": "module-3",
    "topic": "list-comprehensions",
    "errorMessages": [
      "SyntaxError: invalid syntax",
      "SyntaxError: invalid syntax",
      "SyntaxError: invalid syntax"
    ],
    "codeAttempts": [
      "[x for x in range(10]",
      "[x for x range(10)]",
      "[x for in range(10)]"
    ],
    "timeStuck": 420
  },
  "triggeredAt": "2026-03-02T15:00:00Z",
  "autoResolved": false
}
```

