## Topic: progress.updates

**Purpose**: Real-time mastery score updates for dashboards.

### Schema
```json
{
  "$schema": "http://json-schema.org/draft-07/schema#",
  "title": "ProgressUpdate",
  "type": "object",
  "properties": {
    "updateId": {
      "type": "string",
      "format": "uuid"
    },
    "userId": {
      "type": "integer"
    },
    "moduleId": {
      "type": "string"
    },
    "topic": {
      "type": "string"
    },
    "previousMastery": {
      "type": "number",
      "format": "float",
      "description": "Mastery score before update"
    },
    "newMastery": {
      "type": "number",
      "format": "float",
      "description": "Mastery score after update"
    },
    "previousStatus": {
      "type": "string",
      "enum": ["beginner", "learning", "proficient", "mastered"]
    },
    "newStatus": {
      "type": "string",
      "enum": ["beginner", "learning", "proficient", "mastered"]
    },
    "statusChanged": {
      "type": "boolean",
      "description": "Whether status level changed"
    },
    "timestamp": {
      "type": "string",
      "format": "date-time"
    },
    "reason": {
      "type": "string",
      "enum": ["exercise_completed", "quiz_submitted", "code_quality_improved", "consistency_bonus"]
    }
  },
  "required": ["updateId", "userId", "moduleId", "newMastery", "newStatus", "timestamp"]
}
```

### Example Event
```json
{
  "updateId": "990e8400-e29b-41d4-a716-446655440004",
  "userId": 12345,
  "moduleId": "module-2",
  "topic": "for-loops",
  "previousMastery": 65.5,
  "newMastery": 72.0,
  "previousStatus": "learning",
  "newStatus": "proficient",
  "statusChanged": true,
  "timestamp": "2026-03-02T14:35:00Z",
  "reason": "exercise_completed"
}
```

