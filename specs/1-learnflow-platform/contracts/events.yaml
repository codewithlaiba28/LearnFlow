## Topic: code.submissions

**Purpose**: Track all code execution attempts for feedback and analysis.

### Schema
```json
{
  "$schema": "http://json-schema.org/draft-07/schema#",
  "title": "CodeSubmission",
  "type": "object",
  "properties": {
    "submissionId": {
      "type": "string",
      "format": "uuid"
    },
    "userId": {
      "type": "integer"
    },
    "exerciseId": {
      "type": "integer"
    },
    "code": {
      "type": "string",
      "description": "Student's submitted code"
    },
    "output": {
      "type": "string",
      "description": "Program execution output"
    },
    "error": {
      "type": "string",
      "description": "Error message if execution failed"
    },
    "status": {
      "type": "string",
      "enum": ["pending", "success", "error", "timeout"]
    },
    "executionTime": {
      "type": "number",
      "description": "Execution time in milliseconds"
    },
    "timestamp": {
      "type": "string",
      "format": "date-time"
    },
    "testsPassed": {
      "type": "integer",
      "description": "Number of test cases passed"
    },
    "totalTests": {
      "type": "integer",
      "description": "Total test cases"
    }
  },
  "required": ["submissionId", "userId", "exerciseId", "code", "status", "timestamp"]
}
```

### Example Event
```json
{
  "submissionId": "660e8400-e29b-41d4-a716-446655440001",
  "userId": 12345,
  "exerciseId": 42,
  "code": "for i in range(5):\n    print(i)",
  "output": "0\n1\n2\n3\n4\n",
  "status": "success",
  "executionTime": 125,
  "timestamp": "2026-03-02T14:35:00Z",
  "testsPassed": 3,
  "totalTests": 3
}
```

