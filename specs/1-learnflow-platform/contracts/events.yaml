## Topic: exercise.completions

**Purpose**: Track exercise completion for progress calculation.

### Schema
```json
{
  "$schema": "http://json-schema.org/draft-07/schema#",
  "title": "ExerciseCompletion",
  "type": "object",
  "properties": {
    "completionId": {
      "type": "string",
      "format": "uuid"
    },
    "userId": {
      "type": "integer"
    },
    "exerciseId": {
      "type": "integer"
    },
    "moduleId": {
      "type": "string",
      "description": "Module this exercise belongs to"
    },
    "topic": {
      "type": "string",
      "description": "Topic this exercise covers"
    },
    "score": {
      "type": "number",
      "format": "float",
      "description": "Exercise score (0-100)"
    },
    "timeSpent": {
      "type": "integer",
      "description": "Time spent in seconds"
    },
    "attemptNumber": {
      "type": "integer",
      "description": "Which attempt this was (1 = first try)"
    },
    "timestamp": {
      "type": "string",
      "format": "date-time"
    }
  },
  "required": ["completionId", "userId", "exerciseId", "moduleId", "score", "timestamp"]
}
```

### Example Event
```json
{
  "completionId": "770e8400-e29b-41d4-a716-446655440002",
  "userId": 12345,
  "exerciseId": 42,
  "moduleId": "module-2",
  "topic": "for-loops",
  "score": 100,
  "timeSpent": 180,
  "attemptNumber": 1,
  "timestamp": "2026-03-02T14:35:00Z"
}
```

