apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-kong-config
data:
  kong.yml: |
    _format_version: "3.0"
    services:
      - name: triage-agent
        url: http://{{ .Release.Name }}-triage-agent:{{ .Values.backend.triageAgent.port }}
        routes:
          - name: learnflow-api
            paths:
              - /api
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Accept-Version
            - Content-Length
            - Content-MD5
            - Content-Type
            - Date
            - Authorization
          exposed_headers:
            - Content-Length
            - Authorization
          max_age: 3600
          credentials: true
