apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-concepts-agent
  labels:
    app: concepts-agent
spec:
  replicas: {{ .Values.backend.conceptsAgent.replicas }}
  selector:
    matchLabels:
      app: concepts-agent
  template:
    metadata:
      labels:
        app: concepts-agent
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: concepts-agent
          image: "{{ .Values.backend.conceptsAgent.image.repository }}:{{ .Values.backend.conceptsAgent.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.conceptsAgent.port }}
              protocol: TCP
          env:
            - name: APP_ENV
              value: {{ .Values.env.APP_ENV }}
            - name: LOG_LEVEL
              value: {{ .Values.logging.level }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: openai-api-key
                  optional: true
            - name: OPENAI_MODEL
              value: {{ .Values.env.OPENAI_MODEL }}
            - name: KAFKA_BROKERS
              value: "{{ .Release.Name }}-kafka:9092"
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgresql.auth.username }}:$(DATABASE_PASSWORD)@{{ .Release.Name }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: database-password
          resources: {{- toYaml .Values.backend.conceptsAgent.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-concepts-agent
  labels:
    app: concepts-agent
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.backend.conceptsAgent.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: concepts-agent
