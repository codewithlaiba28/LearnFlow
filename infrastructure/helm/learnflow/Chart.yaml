apiVersion: v2
name: learnflow
description: LearnFlow Platform - AI-powered Python tutoring
type: application
version: 0.1.0
appVersion: "1.0.0"

keywords:
  - education
  - ai
  - python
  - tutoring
  - microservices

maintainers:
  - name: Hackathon III Team
    email: team@learnflow.local

dependencies:
  - name: kafka
    version: 26.8.2
    repository: https://charts.bitnami.com/bitnami
    condition: kafka.enabled
  - name: postgresql
    version: 15.5.0
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
