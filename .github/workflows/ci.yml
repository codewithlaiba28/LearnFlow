name: LearnFlow CI/CD

# on:
#   push:
#     branches: [ main ]
#   pull_request:
#     branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/learnflow-frontend:latest,${{ secrets.DOCKER_USERNAME }}/learnflow-frontend:${{ github.sha }}

      - name: Build and Push Backend Agents
        run: |
          for agent in triage concepts debug exercise progress code-review; do
            docker build \
              --build-arg SERVICE_NAME=$agent-agent \
              -t ${{ secrets.DOCKER_USERNAME }}/learnflow-${agent}-agent:latest \
              -t ${{ secrets.DOCKER_USERNAME }}/learnflow-${agent}-agent:${{ github.sha }} \
              ./backend/services
            docker push ${{ secrets.DOCKER_USERNAME }}/learnflow-${agent}-agent:latest
          done

  update-manifests:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: codewithlaiba28/Hackahton-III
          token: ${{ secrets.PAT_TOKEN }}  # Need a personal access token with repo permissions

      - name: Update Helm Values
        run: |
          sed -i 's/tag: "latest"/tag: "${{ github.sha }}"/' infrastructure/helm/learnflow/values.yaml
          
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: update image tags to ${{ github.sha }} [skip ci]"
          git push
